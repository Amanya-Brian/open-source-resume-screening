<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Resume Screening Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:        #49161A;
            --primary-dark:   #300E11;
            --secondary:      #527575;
            --secondary-dark: #3A5555;
            --bg:             #F5F8F8;
            --border:         #DDE8E8;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--bg);
            font-family: 'Jost', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
        }

        /* Brand header */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: var(--primary);
            border-radius: 14px;
            margin-bottom: 1rem;
            box-shadow: 0 4px 14px rgba(73,22,26,0.25);
        }
        .brand-icon i {
            font-size: 1.5rem;
            color: #fff;
        }
        .brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0 0 4px;
            letter-spacing: -.01em;
        }
        .brand p {
            font-size: .83rem;
            color: var(--secondary);
            margin: 0;
            font-weight: 500;
        }

        /* Card */
        .login-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 2px 16px rgba(73,22,26,0.07);
        }

        /* Form */
        .field-label {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--secondary);
            display: block;
            margin-bottom: 6px;
        }
        .form-control {
            border: 1.5px solid var(--border);
            border-radius: 9px;
            font-family: 'Jost', sans-serif;
            font-size: .9rem;
            padding: .55rem .85rem;
            transition: border-color .15s, box-shadow .15s;
        }
        .form-control:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(82,117,117,.15);
            outline: none;
        }

        /* Password wrapper */
        .pw-wrap { position: relative; }
        .pw-toggle {
            position: absolute;
            right: 11px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            padding: 0;
            color: var(--secondary);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }
        .pw-toggle:hover { color: var(--primary); }

        /* Submit button */
        .btn-login {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 9px;
            padding: .65rem 1rem;
            font-family: 'Jost', sans-serif;
            font-weight: 600;
            font-size: .95rem;
            letter-spacing: .01em;
            cursor: pointer;
            transition: background .15s, box-shadow .15s;
            margin-top: .25rem;
        }
        .btn-login:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(73,22,26,0.25); }
        .btn-login:active { transform: translateY(1px); }

        /* Error alert */
        .alert-login {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            border-radius: 9px;
            color: #be123c;
            font-size: .84rem;
            padding: .65rem .9rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Divider bar */
        .top-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--primary) 60%, var(--secondary) 100%);
            border-radius: 16px 16px 0 0;
            margin: -2rem -2rem 1.75rem;
        }
    </style>
</head>
<body>
    <div class="login-wrap">

        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-file-earmark-person"></i>
            </div>
            <h1>Resume Screening Portal</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="login-card">
            <div class="top-bar"></div>

            {% if error %}
            <div class="alert-login">
                <i class="bi bi-exclamation-circle-fill"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off" novalidate>
                <!-- Email -->
                <div class="mb-4">
                    <label class="field-label" for="email">Email address</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        name="email"
                        value="{{ email or '' }}"
                        placeholder="you@example.com"
                        autocomplete="username"
                        required
                        autofocus
                    >
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="field-label" for="password">Password</label>
                    <div class="pw-wrap">
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
                            <i class="bi bi-eye" id="pwIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="loginBtnText">Sign in <i class="bi bi-arrow-right ms-1"></i></span>
                    <span id="loginBtnLoading" style="display:none;">
                        <span class="spinner-border spinner-border-sm me-2" style="width:.85rem;height:.85rem;border-width:2px;" role="status"></span>
                        Signing in…
                    </span>
                </button>
            </form>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggle = document.getElementById('pwToggle');
        const field  = document.getElementById('password');
        const icon   = document.getElementById('pwIcon');

        toggle.addEventListener('click', () => {
            const show = field.type === 'password';
            field.type = show ? 'text' : 'password';
            icon.className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        document.querySelector('form').addEventListener('submit', () => {
            const btn     = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const loading = document.getElementById('loginBtnLoading');
            btnText.style.display  = 'none';
            loading.style.display  = 'inline-flex';
            btn.disabled = true;
        });
    </script>
</body>
</html>
